spring:
  application:
    name: book-service

  flyway:
    enabled: true
    baseline-on-migrate: true

  # Configurações de Conexão com o Banco de Dados
  datasource:
    url: jdbc:postgresql://localhost:5434/postgres
    username: postgres
    password: minhasenha
    driver-class-name: org.postgresql.Driver

  # Configurações do Hibernate / JPA
  jpa:
    # Mostra no console o SQL que o Spring está executando
    show-sql: true

    # Cria e atualiza as tabelas do banco automaticamente
    hibernate:
      ddl-auto: none

    # Formata o SQL no console para ficar mais legível
    properties:
      hibernate:
        format_sql: true

# Configuração do servidor Web (Tomcat)
server:
  port: 8100